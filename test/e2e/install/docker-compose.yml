services:
  adguard-install-e2e:
    build:
      context: ../..
      dockerfile: tests/runtime/install-fixture/Dockerfile
    container_name: adguard-install-e2e
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    ports:
      - "80:80"
      - "53:53/tcp"
      - "53:53/udp"
      - "3000:3000"
    environment:
      ADGUARD_USER: "admin"
      ADGUARD_PASSWORD: "123123123"
    tty: true
    stdin_open: true
