name: lint

env:
  GO_VERSION: 1.26.2

on:
  push:
    tags:
      - v*
    branches:
      - '*'
  pull_request:

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: run-lint
        run: >
          make go-deps go-lint

  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install modules
        run: npm --prefix="./client" ci
      - name: Run ESLint
        run: npm --prefix="./client" run lint

  notify:
    needs:
      - go-lint
      - eslint
    # Secrets are not passed to workflows that are triggered by a pull request
    # from a fork.
    #
    # Use always() to signal to the runner that this job must run even if the
    # previous ones failed.
    if:
      ${{
        always() &&
        github.repository_owner == 'AdguardTeam' &&
        (
          github.event_name == 'push' ||
          github.event.pull_request.head.repo.full_name == github.repository
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ (needs.go-lint.result == 'failure' || needs.eslint.result == 'failure') && '❌ Lint failed' || '✅ Lint passed' }}"
            attachments:
              - color: "${{ (needs.go-lint.result == 'failure' || needs.eslint.result == 'failure') && 'danger' || 'good' }}"
                fields:
                  - title: "Workflow"
                    value: "${{ github.workflow }}"
                    short: true
                  - title: "Repo"
                    value: "<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>"
                    short: true
                  - title: "Message"
                    value: "${{ github.event.head_commit.message }}"
                    short: false
                  - title: "Commit"
                    value: "<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    short: true
                  - title: "Author"
                    value: "${{ github.actor }}"
                    short: true
